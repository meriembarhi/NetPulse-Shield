input {
  tcp {
    port => 5000
    codec => json
    type => "netpulse_alert"
  }
}

filter {
  # Add timestamp if missing
  if ![timestamp] {
    ruby {
      code => 'event.set("timestamp", Time.now.iso8601)'
    }
  }
  
  # Add source field
  mutate {
    add_field => { "source" => "netpulse-shield" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "netpulse-alerts-%{+YYYY.MM.dd}"
  }
  
  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
