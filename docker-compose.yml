version: '3.8'
services:
  redis:
    image: redis:7
    ports:
      - '6379:6379'

  web:
    build: .
    ports:
      - '8501:8501'
    environment:
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: rq worker advisor
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
