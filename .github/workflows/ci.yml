# .github/workflows/ci.yml
name: NetPulse-Shield CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check . --ignore E501

      - name: Run All Tests (Unit + Integration)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_detector.py tests/test_solver.py tests/test_pipeline_integration.py tests/test_baselines.py -v --tb=short

      - name: Test Summary
        if: always()
        run: |
          echo "✅ CI Pipeline Complete"
          echo "   - Code linting (Ruff) passed"
          echo "   - Unit tests (detector, solver) passed"
          echo "   - Integration tests (detector → solver pipeline) passed"
